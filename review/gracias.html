<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias · Rodrigo Rojas Mardones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0a; --text: #ffffff; --muted: #888888; --accent: #c8b89a; --font: 'Space Grotesk', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-weight: 400; line-height: 1.7; -webkit-font-smoothing: antialiased; max-width: 560px; margin: 0 auto; padding: 96px 24px; text-align: center; }
    h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 300; letter-spacing: -0.01em; margin-bottom: 20px; }
    p { font-size: 15px; color: #aaaaaa; margin-bottom: 16px; }
    .accent { color: var(--accent); }
    .back { display: inline-block; margin-top: 40px; font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; border-bottom: 1px solid #333; padding-bottom: 2px; }
    .back:hover { color: var(--text); border-color: var(--text); }
  </style>
</head>
<body>
  <p style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#444;margin-bottom:48px;">rojasmardones.com</p>
  <h1>Gracias,<br><span class="accent">Rodrigo.</span></h1>
  <p>Recibí tus respuestas. Con esto ya puedo armar la siguiente versión del sitio.</p>
  <p>Te escribo por WhatsApp cuando esté listo para revisión.</p>
  <a class="back" href="https://v2.rojasmardones.com">← Ver el sitio</a>
</body>
</html>
